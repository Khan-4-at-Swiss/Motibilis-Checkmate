name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install Android SDK packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Verify wrapper
        run: |
          ls -lh gradle/wrapper
          jar tf gradle/wrapper/gradle-wrapper.jar | head

      - name: Show Gradle version
        run: ./gradlew --version

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/motibilis-checkmate.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: motibilis-checkmate
          path: app/build/outputs/apk/debug/motibilis-checkmate.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Motibilis Checkmate APK
          files: app/build/outputs/apk/debug/motibilis-checkmate.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
