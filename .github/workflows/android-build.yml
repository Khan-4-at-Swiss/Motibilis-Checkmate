name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: ''

      - name: Install Android platform and build-tools
        run: |
          yes | sdkmanager --licenses
          sdkmanager --install "platforms;android-36" "build-tools;36.0.0"

      - name: Make gradlew executable
        run: |
          chmod +x ./gradlew
          chmod +x ./gradlew.bat || true
          mkdir -p ~/.gradle/wrapper/dists

      - name: Download Gradle distribution
        run: |
          curl -L https://services.gradle.org/distributions/gradle-9.1.1-bin.zip -o /tmp/gradle-9.1.1-bin.zip
          unzip -q /tmp/gradle-9.1.1-bin.zip -d /tmp
          echo "GRADLE_EXE=/tmp/gradle-9.1.1/bin/gradle" >> $GITHUB_ENV

      - name: Show Gradle and Java versions
        run: |
          "$GRADLE_EXE" --version
          java -version

      - name: Build debug APK
        run: "$GRADLE_EXE" :app:assembleDebug --no-daemon

      - name: Rename APK for release
        run: cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/motibilis-checkmate.apk

      - name: Create or update release with APK
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: "Motibilis Checkmate APK"
          files: app/build/outputs/apk/debug/motibilis-checkmate.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
