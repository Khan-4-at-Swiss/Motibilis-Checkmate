name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: ''

      - name: Install Android platform and build-tools
        run: |
          sdkmanager --install "platforms;android-36" "build-tools;36.0.0"
          yes | sdkmanager --licenses

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Show Gradle and Java versions
        run: |
          ./gradlew --version
          java -version

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Create or update release with APK
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: "Motibilis Checkmate APK"
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
